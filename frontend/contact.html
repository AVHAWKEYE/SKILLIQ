<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillIQ - Contact</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;min-height:100vh;background:linear-gradient(135deg,#0a0a1a,#11203d 45%,#1f1236);color:#eef2ff;padding:28px 18px}
.wrap{max-width:980px;margin:0 auto}
.card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:22px;backdrop-filter:blur(12px)}
h1{font-family:'Space Grotesk',sans-serif;font-size:34px;margin-bottom:8px}
.sub{color:rgba(238,242,255,.75);margin-bottom:18px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.item{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:14px}
.item h3{font-size:15px;margin-bottom:6px}
.item p{font-size:13px;color:rgba(238,242,255,.82);line-height:1.6}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.btn{padding:9px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;cursor:pointer;text-decoration:none}
.btn:hover{background:rgba(255,255,255,.14)}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Contact</h1>
    <p class="sub">Reach the SkillIQ team for support, feature requests, or deployment help.</p>
    <div class="grid">
      <div class="item"><h3>Support Email</h3><p>support@skilliq.local</p></div>
      <div class="item"><h3>General Inquiries</h3><p>hello@skilliq.local</p></div>
      <div class="item"><h3>Working Hours</h3><p>Mon - Fri, 9:00 AM to 6:00 PM</p></div>
      <div class="item"><h3>Response SLA</h3><p>Usually within 1 business day</p></div>
    </div>
    <div class="actions">
      <a class="btn" href="help.html">Open Help Center</a>
      <a class="btn" href="index.html">Back to Home</a>
    </div>
  </div>
</div>
</body>
</html>
